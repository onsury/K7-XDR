<!--
  K7 AegisXDR — Wazuh Manager Custom Configuration
  ==================================================
  This file extends the default ossec.conf with K7-specific settings.
  Place in: /var/ossec/etc/ossec-custom.conf

  KEY INTEGRATIONS:
  1. Webhook to AegisXDR Scan Engine (high-severity alerts)
  2. Custom log monitoring for K7 virus lab feeds
  3. Active response commands for SOAR playbook execution
  4. Vulnerability detection for Indian enterprise environments
-->

<!-- ==================== AEGISXDR WEBHOOK INTEGRATION ==================== -->
<!-- Forwards high-severity alerts to Aegis Scan Engine for AI analysis -->
<integration>
  <name>custom-aegis-scan</name>
  <hook_url>http://aegis-backend:8000/api/wazuh/webhook</hook_url>
  <level>8</level>
  <alert_format>json</alert_format>
</integration>

<!-- Forward critical alerts (level 12+) for immediate AI triage -->
<integration>
  <name>custom-aegis-critical</name>
  <hook_url>http://aegis-backend:8000/api/wazuh/webhook/critical</hook_url>
  <level>12</level>
  <alert_format>json</alert_format>
</integration>

<!-- ==================== LOG COLLECTION ==================== -->
<!-- Monitor AegisXDR scan engine results (bidirectional integration) -->
<localfile>
  <log_format>json</log_format>
  <location>/var/log/aegis-scan-results.json</location>
  <label key="source">aegis_scan_engine</label>
</localfile>

<!-- Monitor K7 virus lab feed updates -->
<localfile>
  <log_format>json</log_format>
  <location>/var/log/k7-viruslab-feed.json</location>
  <label key="source">k7_virus_lab</label>
</localfile>

<!-- Windows Event Logs (for enterprise Windows endpoints) -->
<localfile>
  <log_format>eventchannel</log_format>
  <location>Security</location>
</localfile>

<localfile>
  <log_format>eventchannel</log_format>
  <location>Microsoft-Windows-PowerShell/Operational</location>
</localfile>

<localfile>
  <log_format>eventchannel</log_format>
  <location>Microsoft-Windows-Sysmon/Operational</location>
</localfile>

<!-- ==================== VULNERABILITY DETECTION ==================== -->
<vulnerability-detector>
  <enabled>yes</enabled>
  <interval>5m</interval>
  <min_full_scan_interval>6h</min_full_scan_interval>
  <run_on_start>yes</run_on_start>

  <!-- Ubuntu/Debian -->
  <provider name="canonical">
    <enabled>yes</enabled>
    <os>focal</os>
    <os>jammy</os>
    <os>noble</os>
    <update_interval>1h</update_interval>
  </provider>

  <!-- Red Hat/CentOS -->
  <provider name="redhat">
    <enabled>yes</enabled>
    <os>8</os>
    <os>9</os>
    <update_interval>1h</update_interval>
  </provider>

  <!-- Windows -->
  <provider name="msu">
    <enabled>yes</enabled>
    <update_interval>1h</update_interval>
  </provider>

  <!-- NVD (National Vulnerability Database) -->
  <provider name="nvd">
    <enabled>yes</enabled>
    <update_interval>1h</update_interval>
  </provider>
</vulnerability-detector>

<!-- ==================== FILE INTEGRITY MONITORING ==================== -->
<syscheck>
  <disabled>no</disabled>
  <frequency>300</frequency>
  <scan_on_start>yes</scan_on_start>

  <!-- Critical system directories -->
  <directories check_all="yes" realtime="yes">/etc,/usr/bin,/usr/sbin</directories>
  <directories check_all="yes" realtime="yes">/bin,/sbin</directories>

  <!-- Windows critical paths -->
  <directories check_all="yes" realtime="yes">%WINDIR%/System32</directories>
  <directories check_all="yes" realtime="yes">%WINDIR%/SysWOW64</directories>

  <!-- Ignore noise -->
  <ignore>/etc/mtab</ignore>
  <ignore>/etc/hosts.deny</ignore>
  <ignore>/etc/mail/statistics</ignore>
  <ignore>/etc/random-seed</ignore>
  <ignore>/etc/adjtime</ignore>
  <ignore>/etc/resolv.conf</ignore>
</syscheck>

<!-- ==================== ACTIVE RESPONSE ==================== -->
<!-- These commands are triggered by SOAR playbooks via AegisXDR -->

<active-response>
  <command>firewall-drop</command>
  <location>local</location>
  <rules_id>100200,100201</rules_id>
  <timeout>3600</timeout>
</active-response>

<active-response>
  <command>disable-account</command>
  <location>local</location>
  <rules_id>100202</rules_id>
  <timeout>86400</timeout>
</active-response>

<!-- Custom K7 quarantine action -->
<command>
  <name>k7-quarantine</name>
  <executable>k7-quarantine.sh</executable>
  <timeout_allowed>yes</timeout_allowed>
</command>

<active-response>
  <command>k7-quarantine</command>
  <location>local</location>
  <rules_id>100203</rules_id>
  <timeout>0</timeout>
</active-response>

<!-- ==================== COMPLIANCE MONITORING ==================== -->
<!-- Indian enterprise compliance requirements -->

<!-- PCI DSS (for BFSI clients) -->
<ruleset>
  <decoder_dir>ruleset/decoders</decoder_dir>
  <rule_dir>ruleset/rules</rule_dir>
  <rule_exclude>0215-policy_rules.xml</rule_exclude>
  <list>etc/lists/audit-keys</list>
  <list>etc/lists/amazon/aws-eventnames</list>
  <list>etc/lists/security-eventchannel</list>
</ruleset>

<!-- ==================== REPORTING ==================== -->
<reports>
  <enabled>yes</enabled>
  <frequency>86400</frequency>
  <email_to>soc@k7computing.com</email_to>
</reports>